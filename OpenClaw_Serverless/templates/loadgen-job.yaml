{{- if .Values.loadgen.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: openclaw-loadgen
  namespace: {{ .Values.namespace }}
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: loadgen
          image: {{ .Values.loadgen.image }}
          command: ["/bin/sh", "-c"]
          args:
            - >-
              req={{ .Values.loadgen.requests }};
              conc={{ .Values.loadgen.concurrency }};
              url="{{ .Values.loadgen.url }}";
              host="{{ .Values.loadgen.hostHeader }}";
              i=1;
              while [ $i -le $req ]; do
                if [ -n "$host" ]; then
                  curl -s -o /dev/null -H "Host: $host" "$url" &
                else
                  curl -s -o /dev/null "$url" &
                fi;
                if [ $((i % conc)) -eq 0 ]; then
                  wait;
                fi;
                i=$((i+1));
              done;
              wait
{{- end }}
