apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-serverless
  namespace: {{ .Values.namespace | default "openclaw" }}
spec:
  replicas: 1  # KEDA will manage replicas
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      containers:
        - name: openclaw-serverless
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          
          ports:
            - containerPort: {{ .Values.service.port }}
          
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          
          # Important: Make sure it listens on all interfaces
          env:
            - name: OPENCLAW_GATEWAY_BIND
              value: "lan"
            - name: OPENCLAW_GATEWAY_PORT
              value: "{{ .Values.service.port }}"
          
          # Command to ensure correct binding
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Setting OpenClaw gateway bind to LAN..."
              openclaw config set gateway.bind lan || true
              openclaw config set gateway.port {{ .Values.service.port }} || true
              exec openclaw gateway start
          
          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw
          
          # Probes (very important for KEDA)
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 5
          
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-pvc