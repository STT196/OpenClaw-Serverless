apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-serverless
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      containers:
        - name: openclaw-serverless
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.service.port }}

          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}

          # Fix listening on all interfaces
          env:
            - name: OPENCLAW_GATEWAY_BIND
              value: "lan"

          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "=== Setting OpenClaw to listen on all interfaces ==="
              openclaw config set gateway.bind lan || true
              openclaw config set gateway.port {{ .Values.service.port }} || true
              exec openclaw gateway start

          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw

          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName