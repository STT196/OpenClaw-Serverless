apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-serverless
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: openclaw-serverless
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}

          ports:
            - containerPort: {{ .Values.service.port }}

          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}

          # Just set the env var - let the original entrypoint handle it
          env:
            - name: OPENCLAW_GATEWAY_BIND
              value: "lan"
            - name: OPENCLAW_GATEWAY_TOKEN
              value: "{{ .Values.gatewayAuthToken }}"
            - name: OPENCLAW_CONFIG_PATH
              value: "/etc/openclaw/openclaw.json"

          volumeMounts:
            - name: config
              mountPath: /etc/openclaw
              readOnly: true
            - name: data
              mountPath: /home/node/.openclaw

          readinessProbe:
            tcpSocket:
              port: {{ .Values.service.port }}
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 5

          livenessProbe:
            tcpSocket:
              port: {{ .Values.service.port }}
            initialDelaySeconds: 40
            periodSeconds: 10
            timeoutSeconds: 5

      volumes:
        - name: config
          configMap:
            name: openclaw-config
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-pvc