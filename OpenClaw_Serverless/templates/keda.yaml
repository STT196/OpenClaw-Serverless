apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: openclaw-scaler
  namespace: openclaw
spec:
  scaleTargetRef:
    name: openclaw-serverless
  minReplicaCount: 0
  maxReplicaCount: 5
  pollingInterval: 15
  cooldownPeriod: 60
  triggers:
    - type: cpu
      metadata:
        type: Utilization
        value: "60"