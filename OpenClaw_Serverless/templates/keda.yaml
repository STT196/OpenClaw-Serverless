apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: openclaw-http-scaler
  namespace: openclaw
spec:
  hosts:
    - openclaw.localhost.com

  # Scaling behavior
  replicas:
    min: 1          # Enables true scale-to-zero / hibernation
    max: 5

  targetPendingRequests: 100   # Scale up when ~100 requests are waiting

  scaleTargetRef:
    name: openclaw-serverless     # Deployment name
    kind: Deployment
    apiVersion: apps/v1
    service: openclaw-service     # Your app Service
    port: 18789

  # Optional: fine-tune cooldown
  # scaledownPeriod: 300   # seconds before scaling down