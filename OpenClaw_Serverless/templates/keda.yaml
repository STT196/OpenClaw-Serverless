apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: openclaw-http-scaler
spec:
  host: openclaw.localhost.com # Must match the Ingress host
  targetPendingRequests: 100
  scaleTargetRef:
    name: openclaw-serverless
    kind: Deployment
    apiVersion: apps/v1
    service: openclaw-service
    port: 80
  replicas:
    min: 0 # Enables Hibernation
    max: 5